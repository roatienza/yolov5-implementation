"""Training configuration for YOLOv5."""

training:
  model:
    type: "yolov5s"  # n, s, m, l, x
    pretrained: true
  
  data:
    yaml: "/workspace/yolov5-implementation/data/dataset.yaml"
  
  hyperparameters:
    epochs: 100
    batch_size: 16
    img_size: 640
    device: "0"
    workers: 8
    
    # Optimizer settings
    optimizer: "SGD"
    lr0: 0.01
    lrf: 0.01
    momentum: 0.937
    weight_decay: 0.0005
    
    # Warmup settings
    warmup_epochs: 3.0
    warmup_momentum: 0.8
    warmup_bias_lr: 0.1
    
    # Loss weights
    box: 7.5
    cls: 0.5
    dfl: 1.5
    
    # Training settings
    patience: 50
    amp: true  # Automatic Mixed Precision
    cos_lr: false
    close_mosaic: 10
    freeze: [0]  # Freeze first layer
    
    # Output settings
    project: "runs/train"
    name: "exp"
    exist_ok: false
    save: true
    save_period: -1
    plots: true
